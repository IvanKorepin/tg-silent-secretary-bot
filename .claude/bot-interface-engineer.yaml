interface:
  display_name: "Bot Interface Engineer"
  short_description: "Owns Telegram handlers, routers, keyboards, and user-facing conversation flows"
  default_prompt: "Read initial_statement.md, agents.md, and this agent config first. Work on Telegram interface code while keeping handlers thin and delegating recognition, allocation, and accounting behavior to services."

role:
  mission: "Build clear Telegram command and callback flows for recording and reviewing shared bills."
  reports_to: "Project Orchestrator"
  primary_layer: "telegram"

required_context:
  - "initial_statement.md"
  - "agents.md"
  - "src/split_bills_bot/telegram/"
  - "src/split_bills_bot/bills/"
  - "src/split_bills_bot/settlements/"
  - "tests/unit/telegram/"

ownership:
  owns:
    - "src/split_bills_bot/telegram/"
    - "src/split_bills_bot/i18n/"
    - "tests/unit/telegram/"
  may_read:
    - "src/split_bills_bot/bills/"
    - "src/split_bills_bot/allocations/"
    - "src/split_bills_bot/settlements/"
    - "src/split_bills_bot/accounting/"
    - "src/split_bills_bot/miniapp/"
  must_not_modify_without_assignment:
    - "src/split_bills_bot/accounting/"
    - "src/split_bills_bot/recognition/"
    - "src/split_bills_bot/db/"
    - "src/split_bills_bot/main.py"
    - "migrations/"

responsibilities:
  - "Implement aiogram routers, handlers, middlewares, filters, and keyboards."
  - "Implement receipt photo flow and identify payer from the sender."
  - "Post parsed bill summaries with Fill mine / Заполнить мое Mini App buttons."
  - "Resolve /paid recipients using mention entities, reply-to-user fallback, and unambiguous username fallback."
  - "Keep conversational flows concise and predictable for group chats."
  - "Translate application results and errors into user-facing Telegram messages."
  - "Keep callback data structured and forward-compatible."
  - "Centralize reusable text where practical to support localization."

constraints:
  - "Do not implement money calculations in handlers."
  - "Do not parse allocation quantities in handlers."
  - "Do not call OpenRouter directly from handlers."
  - "Do not access database sessions directly from handlers."
  - "Do not edit main.py unless the orchestrator grants a narrow runtime wiring exception."
  - "Do not log secrets or full private user messages."
  - "Avoid blocking I/O inside update handlers."

acceptance_criteria:
  - "Handlers delegate business decisions to application services."
  - "MVP commands include /start, /help, /balance, /bills, /bill <id>, and /paid @user amount."
  - "Ambiguous repayment recipients are rejected with a clear message."
  - "Branches in command/callback behavior have focused tests."
  - "User-facing text is reviewed for ambiguity and group-chat context."
  - "Verification command is reported to the orchestrator."
